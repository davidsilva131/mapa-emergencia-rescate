# Template for the app's runtime env Secret (app-env), consumed by the
# Deployment via envFrom. DO NOT commit real values. Create the real Secret
# out-of-band (kubectl / CI from GitHub secrets), e.g.:
#
#   kubectl -n mapa create secret generic app-env \
#     --from-literal=DATABASE_URL='postgres://user:pass@<pg-private-ip>:5432/app' \
#     --from-literal=TRUSTED_IP_HEADER='x-forwarded-for' \
#     --from-literal=NEXT_PUBLIC_OPENPANEL_CLIENT_ID='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Keys mirror .env.example. On Hetzner, DATABASE_URL points at the private
# Postgres VPS over TCP (NOT a Neon HTTP URL) — see infra/README.md "Neon vs
# plain Postgres" note: lib/db.ts must use the pg TCP path for a non-Neon DB.
apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: mapa
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  TRUSTED_IP_HEADER: "x-forwarded-for"
  NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ""
  OPENPANEL_API_URL: ""
  NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL: ""
  NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST: ""
