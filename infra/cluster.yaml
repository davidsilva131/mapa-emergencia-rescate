# hetzner-k3s cluster definition.
#
# `hetzner-k3s create --config infra/cluster.yaml` provisions: the private
# network, the k3s control plane + workers, the Hetzner cloud-controller-manager
# (so a Service type=LoadBalancer auto-creates a real Hetzner LB), and the
# cluster-autoscaler for pools that enable it.
#
# Topology (phase 1 — matches the accepted single-point-of-failure tradeoff):
#   - 1 master  (control plane; non-HA. If it dies, running pods keep serving;
#                you just can't deploy until it's back. Bump to 3 for real HA.)
#   - 2 workers (the app "cattle"), autoscaling headroom to 4 for deploy surge.
# Postgres + Valkey are NOT in the cluster — they are separate VPS pets on the
# same private network (provisioned via OpenTofu / by hand). See infra/README.
#
# Token is read from the HCLOUD_TOKEN env var (do NOT hardcode it here).
config_format_version: 1
hetzner_token: <%= ENV["HCLOUD_TOKEN"] %>
cluster_name: mapa
kubeconfig_path: "./kubeconfig"
k3s_version: v1.32.0+k3s1

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: "~/.ssh/mapa_k3s.pub"
    private_key_path: "~/.ssh/mapa_k3s"
  allowed_networks:
    # Who may reach the k8s API / SSH. Tighten to your admin IP(s) in prod.
    ssh:
      - 0.0.0.0/0
    api:
      - 0.0.0.0/0
  private_network:
    enabled: true
    subnet: 10.0.0.0/16
  public_network:
    ipv4: true
    ipv6: true
  cni:
    enabled: true
    encryption: false
    mode: flannel

# Prevent `hetzner-k3s delete` from nuking the cluster by accident.
protect_against_deletion: true

masters_pool:
  instance_type: cx22      # 2 vCPU / 4GB — fine for a single control plane
  instance_count: 1
  location: nbg1

worker_node_pools:
  - name: app
    instance_type: cx22    # 2 vCPU / 4GB app nodes
    instance_count: 2
    location: nbg1
    autoscaling:
      enabled: true
      min_instances: 2     # never below 2 -> always >=1 serving during a roll
      max_instances: 4     # headroom for maxSurge + load spikes
